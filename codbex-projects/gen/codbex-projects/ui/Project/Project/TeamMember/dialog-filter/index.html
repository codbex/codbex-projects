<!DOCTYPE HTML>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" ng-app="page" ng-controller="PageController">

    <head>
		<meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="icon" sizes="any" href="data:;base64,iVBORw0KGgo=">
        <title config-title></title>
        <script type="text/javascript" src="view.js"></script>
        <meta name="platform-links" category="ng-view">
        <script type="text/javascript" src="controller.js"></script>
    </head>

    <body class="bk-vbox">
        <bk-scrollbar class="bk-full-height">
			<bk-message-strip class="fd-margin--md" ng-show="errorMessage" glyph="sap-icon--message-error" state="error" on-dismiss="clearErrorMessage()">{{ errorMessage }}</bk-message-strip>

            <bk-fieldset class="fd-padding-begin-end--sm" ng-form="forms.details">
                <bk-form-group label="{{ 'codbex-projects:codbex-projects-model.defaults.formGrpFilter' | t:{'name':'$t(codbex-projects:codbex-projects-model.t.TEAMMEMBER)'} }}" name="entityForm" transclude-classes="fd-container fd-form-layout-grid-container">
                    <bk-form-item class="fd-row">
                    	<div class="fd-col fd-col-md--2">
                        	<bk-form-label for="idEmployee" colon="true">{{ 'codbex-projects:codbex-projects-model.t.TEAMMEMBER_EMPLOYEE' | t }}</bk-form-label>
                        </div>
                        <div class="fd-col fd-col-md--8">
	                        <bk-combobox-input input-id="idEmployee"
	                            name="Employee"
	                            state="{{ forms.details['Employee'].$valid ? '' : 'error' }}"
	                            ng-model="entity.Employee"
	                            dropdown-items="optionsEmployee"
	                            placeholder="{{ 'codbex-projects:codbex-projects-model.messages.inputSearch' | t:{'name':'$t(codbex-projects:codbex-projects-model.t.TEAMMEMBER_EMPLOYEE)'} }}"
								btn-aria-label="{{ 'codbex-projects:codbex-projects-model.aria.showHide' | t:{'name':'Employee'} }}" list-aria-label="{{ 'codbex-projects:codbex-projects-model.aria.options' | t:{'name':'Employee'} }}">
	                        </bk-combobox-input>
	                    </div>
                    </bk-form-item>
                    <bk-form-item class="fd-row">
                    	<div class="fd-col fd-col-md--2">
                        	<bk-form-label for="idMemberRole" colon="true">{{ 'codbex-projects:codbex-projects-model.t.TEAMMEMBER_MEMBERROLE' | t }}</bk-form-label>
                        </div>
                        <div class="fd-col fd-col-md--8">
	                        <bk-combobox-input input-id="idMemberRole"
	                            name="MemberRole"
	                            state="{{ forms.details['MemberRole'].$valid ? '' : 'error' }}"
	                            ng-model="entity.MemberRole"
	                            dropdown-items="optionsMemberRole"
	                            placeholder="{{ 'codbex-projects:codbex-projects-model.messages.inputSearch' | t:{'name':'$t(codbex-projects:codbex-projects-model.t.TEAMMEMBER_MEMBERROLE)'} }}"
								btn-aria-label="{{ 'codbex-projects:codbex-projects-model.aria.showHide' | t:{'name':'MemberRole'} }}" list-aria-label="{{ 'codbex-projects:codbex-projects-model.aria.options' | t:{'name':'MemberRole'} }}">
	                        </bk-combobox-input>
	                    </div>
                    </bk-form-item>
                </bk-form-group>
            </bk-fieldset>
        </bk-scrollbar>

        <bk-bar bar-design="footer" compact="true" ng-show="action !== 'select'">
			<bk-bar-right>
				<bk-bar-element>
					<bk-button label="{{ 'codbex-projects:codbex-projects-model.defaults.filter' | t }}" state="emphasized" ng-click="filter()"></bk-button>
				</bk-bar-element>
				<bk-bar-element>
					<bk-button label="{{ 'codbex-projects:codbex-projects-model.defaults.reset' | t }}" ng-click="resetFilter()"></bk-button>
				</bk-bar-element>
				<bk-bar-element>
					<bk-button label="{{ 'codbex-projects:codbex-projects-model.defaults.cancel' | t }}" ng-click="cancel()"></bk-button>
				</bk-bar-element>
			</bk-bar-right>
		</bk-bar>
		<theme></theme>
    </body>

</html>
